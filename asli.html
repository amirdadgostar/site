<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <!-- حفظ کتابخانه‌های خارجی طبق نسخه اصلی -->
  <link rel="stylesheet" href="wendor/bootstrap/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="wendor/fontawsome/fontawesome.min.css">
  
  <style>
    /* START OF ORIGINAL app.css */
    body{
      background: #FFF;
      color: #222;
    }

    .header{ 
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 0;
      background-color: #F1ECE6;
      position: relative;
      font-size: 20px;
    }

    .header-login{ 
      position: absolute;
      right: 0;
      top: 47px;
      margin-right: 26px;
    }

    .header-login__link--active:hover{
      background-color: #737373;
      color: #fff;
      transition: all 100ms ease;
      -webkit-transition: all 100ms ease;
      -moz-transition: all 100ms ease;
      -ms-transition: all 100ms ease;
      -o-transition: all 100ms ease;
    }

    .header-login__link:hover{
      background-color: #D98326;
      color: #fff;
      transition: all 100ms ease;
      -webkit-transition: all 100ms ease;
      -moz-transition: all 100ms ease;
      -ms-transition: all 100ms ease;
      -o-transition: all 100ms ease;
    }

    .btn-outline-primary:hover{ 
      background-color: #737373 !important;
    }
    .btn-outline-warning:hover{ 
      background-color: #D98326 !important;
    }

    .header__darkmode{ 
      all:unset;
      position: absolute;
      width: 20px;
      height: 20px;
      color: rgba(0, 0, 0, 0.5);
      right: 180px;
      bottom: 4px;
      font-size: 18px;
      cursor: pointer;
    }

    .bi-brightness-high-fill{ 
      font-size: 22px;
      bottom: 10px;
    }

    .header-filter{ 
      position: absolute;
      left: 0;
      top: 49px;
      margin-left: 26px;
    }

    .wrapper{ 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      width: 90%;
      margin: 0 auto;
    }
    .add-task{ 
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 30px;
    }
    .error-msg{ 
      color: red;
      font-size: 14px;
      position: absolute;
      top: 190px;
    }
    .invalid{ 
      border: 1px solid red;
    }
    .add-task__input{
      display: block;
      width: 100%;
      background: #F1ECE6;
      border: none;
      outline: none;
      padding: 18px;
      border-radius: 20px 0 0 20px;
      -webkit-border-radius: 20px 0 0 20px;
      -moz-border-radius: 20px 0 0 20px;
      -ms-border-radius: 20px 0 0 20px;
      -o-border-radius: 20px 0 0 20px;
    }
    .add-task__link{
      text-decoration: none;
      background-color: #76B7CD;
      padding: 18px 20px;
      color: #fff;
      font-weight: 500;
      border: none;
      border-radius: 0 20px 20px 0;
      cursor: pointer;
      -webkit-border-radius: 0 20px 20px 0;
      -moz-border-radius: 0 20px 20px 0;
      -ms-border-radius: 0 20px 20px 0;
      -o-border-radius: 0 20px 20px 0;
    }

    .task-status{
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 25px;
      background-color: #F1ECE6;
      width: 100%;
      padding: 18px 20px 120px 20px;
      border-radius: 20px;
      -webkit-border-radius: 20px;
      -moz-border-radius: 20px;
      -ms-border-radius: 20px;
      -o-border-radius: 20px;
      position: relative;
      margin-bottom: 40px;
    }
    .task-status__item{ 
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      position: relative;
    }

    .task-status__circale{ 
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .done-task {
      text-decoration: line-through;
      color: gray;
    }

    .rounded-circle{
      width: 40px;
      height: 40px;
      border: 4px solid #737373;
      background-color: transparent;
      cursor: pointer;
      position: relative;
    }

    .checked-orange {
      border-color: #D98326 !important;
    }

    .checked-orange__check{ 
      position: absolute;
      top: 3px;
      width: 30px;
      height: 32px;
      fill:  #D98326 !important;
    }

    .task-status__text::after{ 
      content: "";
      position: absolute;
      width: 91%;
      height: 1px;
      background-color: #76B7CD;
      top: 55px;
      left: 51px;
      opacity: 0.4;
    }

    .task-status__delete{ 
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .task-status__delete-icon{ 
      fill: #000;
      opacity: 0.4;
    }

    .clear-complate{ 
      position: absolute;
      bottom: 18px;
      right: 58px;
    }
    .clear-complate__link{ 
      text-decoration: none;
      color: #D98326;
    }
    .clear-complate__icon{ 
      width: 22px;
      height: 27px;
    }

    .nav-btn{
      width: 40px;
      height: 40px;
      background-color: #F1ECE6;
      border-radius:12px;
      display: flex;
      justify-content: center;
      align-items:center;
      position: absolute;
      right: 10px;
      -webkit-border-radius:12px;
      -moz-border-radius:12px;
      -ms-border-radius:12px;
      -o-border-radius:12px;
    }
    .nav-btn__line{
      display: block;
      width: 28px;
      height: 3px;
      background-color: #737373;
      border-radius: 4px;
      -webkit-border-radius: 4px;
      -moz-border-radius: 4px;
      -ms-border-radius: 4px;
      -o-border-radius: 4px;
      transition: all 100ms ease-in-out;
      -webkit-transition: all 100ms ease-in-out;
      -moz-transition: all 100ms ease-in-out;
      -ms-transition: all 100ms ease-in-out;
      -o-transition: all 100ms ease-in-out;
    }

    .nav-btn__line::after{
      content: " ";
      display: block;
      position: absolute;
      width: 28px;
      height: 3px;
      background-color: #737373;
      bottom: 12px;
      border-radius: 4px;
      -webkit-border-radius: 4px;
      -moz-border-radius: 4px;
      -ms-border-radius: 4px;
      -o-border-radius: 4px;
      transition: all 200ms ease-in-out;
      -webkit-transition: all 200ms ease-in-out;
      -moz-transition: all 200ms ease-in-out;
      -ms-transition: all 200ms ease-in-out;
      -o-transition: all 200ms ease-in-out;
    }

    .nav-btn__line::before{
      content: " ";
      display: block;
      position: absolute;
      width: 28px;
      height: 3px;
      background-color: #737373;
      top: 13px;
      border-radius: 4px;
      -webkit-border-radius: 4px;
      -moz-border-radius: 4px;
      -ms-border-radius: 4px;
      -o-border-radius: 4px;
      transition: all 200ms ease-in-out;
      -webkit-transition: all 200ms ease-in-out;
      -moz-transition: all 200ms ease-in-out;
      -ms-transition: all 200ms ease-in-out;
      -o-transition: all 200ms ease-in-out;
    }

    .nav-btn__line--opern{ 
      background: transparent;
    }

    .nav-btn__line--opern::after{
      transform: translateY(-6px) rotate(-45deg);
      -webkit-transform: translateY(-6px) rotate(-45deg);
      -moz-transform: translateY(-6px) rotate(-45deg);
      -ms-transform: translateY(-6px) rotate(-45deg);
      -o-transform: translateY(-6px) rotate(-45deg);
    }
    .nav-btn__line--opern::before{
      transform: translateY(6px) rotate(45deg);
      -webkit-transform: translateY(6px) rotate(45deg);
      -moz-transform: translateY(6px) rotate(45deg);
      -ms-transform: translateY(6px) rotate(45deg);
      -o-transform: translateY(6px) rotate(45deg);
    }

    /* Start Darkmood Style */
    body.dark-mode {
      background-color: #202c3a;
      color: #fff;
    }

    body.dark-mode .header {
      background: rgba(28, 39, 51, 0.9); 
      backdrop-filter: blur(10px);   
      box-shadow: 0 1px 2px rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    body.dark-mode .header a,
    .dark-mode .header i { 
      color: #cfd6e6 !important
    }

    .dark-mode .btN{
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      color: #fff;
      border-radius: 8px;
      transition: all 3ms ease;
    }

    .dark-mode .add-task__input{ 
      background-color: rgba(28, 39, 51, 0.9);
      color: #cfd6e6 !important;
    }

    .dark-mode .add-task__link{ 
      background-color: #76b7cd17;
      color: #cfd6e6 !important;
    }

    .dark-mode .task-status{ 
      background-color: rgba(28, 39, 51, 0.9);
    }

    .dark-mode .task-status__text{ 
      color: #cfd6e6 !important;;
    }

    .dark-mode .task-status__delete-icon{ 
      fill: #cfd6e6;
      opacity: 0.6;
    }

    .dark-mode .nav-btn{ 
      background-color: #202c3a;
    }

    .dark-mode .mobile{ 
      background-color: rgba(32, 44, 58, 0.3);
      color: #cfd6e6;
    }

    .dark-mode .mobile-title{ 
      background-color: rgba(28, 39, 51, 0.9);
      color: #cfd6e6;
      box-shadow: 0 1px 2px rgba(255, 255, 255, 0.05);
      border: none;
    }

    .dark-mode .mobile-darkmode{ 
      color: #cfd6e6;
    }

    .dark-mode .error-msg{ 
      color: #cfd6e6;
    }
    /* Finish Darkmode Style */

    /* Start Responsive Header Style */
    .mobile{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      z-index: 1;
      left: -300px;
      top: 0;
      bottom: 0;
      background-color: rgba(191, 186, 180, 0.3);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1rem;
      width: 75%;
      max-width: 300px;
      transition: all 200ms ease-in-out;
      -webkit-transition: all 200ms ease-in-out;
      -moz-transition: all 200ms ease-in-out;
      -ms-transition: all 200ms ease-in-out;
      -o-transition: all 200ms ease-in-out;
    }
    .mobile--open{ 
      left: 0;
    }

    .mobile-title{ 
      position: absolute;
      top: 0;
      width: 100%;
      height: 50px;
      line-height: 50px;
      color: #737373;
      background-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      font-weight: bold;
      font-size: 27px;
      box-shadow: 0 0 10px rgba(255,255,255,02);
    }

    .mobile-login{ 
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: absolute;
      top: 260px;
      left: 31px;
    }

    .btN{
      text-decoration: none;
      font-size: 18px;
      background-color: rgba(255, 255, 255, 0.1);
      color: #737373;
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      padding: 5px 10px;
      border-radius: 7px;
      transition: all 0.3s ease;
      -webkit-border-radius: 7px;
      -moz-border-radius: 7px;
      -ms-border-radius: 7px;
      -o-border-radius: 7px;
    }
    .mobile-darkmode{ 
      position: absolute;
      top: 83px;
      right: 30px;
      color: rgba(50, 50, 50, 0.7);
      cursor: pointer;
    }
    .mobile-filter{ 
      position: absolute;
      top: 80px;
      left: 31px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      justify-content: center;
    }
    /* END OF ORIGINAL app.css */


    /* START OF ORIGINAL responsive.css */
    /* Mobile first */
    @media (max-width: 576px){ 
      .header-login{ 
        display: none;
      }
      .header-filter{ 
        display: none;
      }
      .header-logo{ 
        width: 154px;
        height: 40px;
      }
      /* Add task */
      .add-task__input,
      .add-task__link{ 
        font-size: 15px;
        padding: 15px 15px;
      }
      /* task status */
      .task-status__item{ 
        font-size: 15px;
      }
      .task-status__circale{ 
        gap: 12px;
      }
      .rounded-circle{ 
        width: 30px;
        height: 30px;
        border: 3px solid #737373;
      }
      .checked-orange__check{ 
        top: 4px;
        width: 22px;
        height: 22px;
      }
      .task-status__edit-container{ 
        top: 5px;
        right: 30px;
      }
      .task-status__delete-icon{ 
        width: 17px;
        height: 17px;
      }
      .task-status__text::after{ 
        width: 80%;
        top: 44px;
        left: 44px;
      }
      .clear-complate__icon {
        width: 18px;
        height: 21px;
      }
      .clear-complate__text{ 
        font-size: 15px;
      }
      .error-msg{ 
        top: 157px;
        font-size: 12px;
      }
    }

    /* Tablet */
    @media (min-width: 577px) and (max-width: 768px){ 
      .header-login{ 
        display: none;
      }
      .header-filter{ 
        display: none;
      }
      .header-logo{ 
        width: 200px;
        height: 62px;
      }
      .wrapper{ 
        width: 100%;
      }
      /* Add task */
      .add-task__input,
      .add-task__link{ 
        font-size: 17px;
        padding: 16px 20px;
      }
      /* Task status */
      .task-status__item{ 
        font-size: 17px;
      }
      .task-status__circale{ 
        gap: 12px;
      }
      .rounded-circle{ 
        width: 35px;
        height: 35px;
        border: 3px solid #737373;
      }
      .task-status__delete-icon{ 
        width: 20px;
        height: 20px;
      }
      .task-status__text::after{ 
        width: 88%;
        top: 48px;
        left: 44px;
      }
      .clear-complate__icon {
        width: 19px;
        height: 22px;
      }
      .clear-complate__text{ 
        font-size: 17px;
      }
      .error-msg{ 
        top: 185px;
        font-size: 13px;
      }
    }

    /* Lap top */
    @media (min-width: 769px) and (max-width: 992px){ 
      .nav-btn,
      .mobile{ 
        display: none;
      }
      .btN{ 
        font-size: 16px;
      }
      .header-logo{ 
        width: 216px;
        height: 62px;
      }
      .header__darkmood{ 
        right: 160px;
        width: 18px;
        height: 18px;
      }
      /* Task status */
      .task-status__delete-icon{ 
        width: 20px;
        height: 24px;
      }
      .task-status__text::after{ 
        width: 89%;
      }
    }

    /* Desktop */
    @media (min-width: 993px){ 
      .nav-btn,
      .mobile{ 
        display: none;
      }
      /* Task status */
      .task-status__delete-icon{ 
        width: 20px;
        height: 24px;
      }
      .task-status__text::after{ 
        width: 92%;
      }
    }
    /* END OF ORIGINAL responsive.css */
  </style>
</head>

              <path d="M1.99999 21.3333C1.99999 22.8 3.19999 24 4.66666 24H15.3333C16.8 24 18 22.8 18 21.3333V5.33333H1.99999V21.3333ZM4.66666 8H15.3333V21.3333H4.66666V8ZM14.6667 1.33333L13.3333 0H6.66666L5.33332 1.33333H0.666656V4H19.3333V1.33333H14.6667Z"/> 
            </svg>           </div>
        </div>

        <div class="task-status__item default-task">
          <div class="task-status__circale">
            <div class="rounded-circle"></div>
            <span class="task-status__text">Personal Work No.</span>
          </div>
          <div class="task-status__delete">
            <svg viewBox="0 0 20 24" xmlns="http://www.w3.org/2000/svg" class="task-status__delete-icon"> 
              <path d="M1.99999 21.3333C1.99999 22.8 3.19999 24 4.66666 24H15.3333C16.8 24 18 22.8 18 21.3333V5.33333H1.99999V21.3333ZM4.66666 8H15.3333V21.3333H4.66666V8ZM14.6667 1.33333L13.3333 0H6.66666L5.33332 1.33333H0.666656V4H19.3333V1.33333H14.6667Z"/> 
            </svg> 
          </div>
        </div> 
      </div>
      
    </div>
  </div>
  <script src="wendor/fontawsome/all.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    /* START OF ORIGINAL JS FOR SCRIPT.JS (With strict zero-deletion + Fetch integration) */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUCEMdaukDMdWeC6RovqXNRtukCfprYT5Ut5Iw6bcD7jJkPldBoC0eUo9tTCdundMN-w/exec";

    // بررسی ورود و دریافت تسک‌ها در زمان بارگذاری صفحه
    window.addEventListener("DOMContentLoaded", () => {
      const currentUser = localStorage.getItem("loggedInUser");
      if (!currentUser) {
        window.location.href = "./sign_in.html";
        return;
      }

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getTasks", username: currentUser })
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          // حذف تسک‌های دیفالت تا تسک‌های واقعی لود شوند
          const taskStatus = document.getElementById("taskStatus");
          taskStatus.innerHTML = ''; 

          data.tasks.forEach(taskObj => {
            const newTaskItem = document.createElement("div");
            newTaskItem.className = "task-status__item";
            let isDone = taskObj.status === 'done';
            
            let circleHtml = isDone 
              ? `<div class="rounded-circle checked-orange"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" class="checked-orange__check"><path d="M13.485 1.929l-7.07 7.07-3.536-3.536-1.414 1.414 4.95 4.95 8.485-8.485z" class="checked-orange__check"/></svg></div>` 
              : `<div class="rounded-circle"></div>`;

            let textClass = isDone ? "task-status__text done-task" : "task-status__text";

            newTaskItem.innerHTML = `
              <div class="task-status__circale">
                ${circleHtml}
                <span class="${textClass}">${taskObj.task}</span>
              </div>
              <div class="task-status__delete">
                <svg viewBox="0 0 20 24" xmlns="http://www.w3.org/2000/svg" class="task-status__delete-icon"> 
                  <path d="M1.99999 21.3333C1.99999 22.8 3.19999 24 4.66666 24H15.3333C16.8 24 18 22.8 18 21.3333V5.33333H1.99999V21.3333ZM4.66666 8H15.3333V21.3333H4.66666V8ZM14.6667 1.33333L13.3333 0H6.66666L5.33332 1.33333H0.666656V4H19.3333V1.33333H14.6667Z"/> 
                </svg> 
              </div>
            `;
            taskStatus.appendChild(newTaskItem);
          });
        }
      });
    });

    // Start Nav-btn
    const navBtn = document.querySelector(".nav-btn__line");
    const headerMobile = document.querySelector(".mobile")
    let btn = false;
    navBtn.addEventListener("click", () => { 
      if (btn) {
        btn = false
        headerMobile.classList.add("mobile--open")
        navBtn.classList.add("nav-btn__line--opern")
        
      }else{ 
        btn = true
        headerMobile.classList.remove("mobile--open")
        navBtn.classList.remove("nav-btn__line--opern")
      }
    })
    // Finish Nav-btn

    // Start Darkmood
    const toggleBtn = document.querySelector(".header__darkmode");
    const body = document.body;

    toggleBtn.addEventListener("click", () => { 
      body.classList.toggle("dark-mode");
      if (body.classList.contains("dark-mode")) {
        toggleBtn.classList.remove("bi-moon-stars-fill");
        toggleBtn.classList.add("bi-brightness-high-fill");
      } else { 
        toggleBtn.classList.remove("bi-brightness-high-fill");
        toggleBtn.classList.add("bi-moon-stars-fill");
      }
    })

    const toggleBtn2 = document.querySelector(".mobile-darkmode");
    const body2 = document.body;

    toggleBtn2.addEventListener("click", () => { 
      body2.classList.toggle("dark-mode");
      if (body2.classList.contains("dark-mode")) {
        toggleBtn2.classList.remove("bi-moon-stars-fill");
        toggleBtn2.classList.add("bi-brightness-high-fill");
      } else { 
        toggleBtn2.classList.remove("bi-brightness-high-fill");
        toggleBtn2.classList.add("bi-moon-stars-fill");
      }
    })
    // Finish Darkmode


    // Start Add Task 
    document.addEventListener("DOMContentLoaded", () => {
      const taskInput = document.getElementById("taskInput");
      const addBtn = document.getElementById("addBtn");
      const errorMsg = document.getElementById("errorMsg");
      const clearAllbtn = document.querySelector(".clear-complate__link");
      const taskStatus = document.getElementById("taskStatus");
      const filterLinks = document.querySelectorAll(".header-filter__link");
      const filtermobile = document.querySelectorAll(".mobile-filter__link")
      let tasks = [];

      addBtn.addEventListener("click", () => {
        const taskValue = taskInput.value.trim();
        errorMsg.textContent = "";

        if (!taskValue) {
          errorMsg.textContent = "Please enter a task.";
          setTimeout(() => errorMsg.textContent = "", 2000);
          return;
        }

        const currentUser = localStorage.getItem("loggedInUser");
        if (!currentUser) {
           alert("Please login first!");
           window.location.href = "./sign_in.html";
           return;
        }

        const addBtnOriginalText = addBtn.textContent;
        addBtn.textContent = "...";

        // ارسال به سرور دقیقاً پیش از اجرای کدهای اصلی شما
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "addTask",
            username: currentUser,
            task: taskValue
          })
        })
        .then(res => res.json())
        .then(data => {
          addBtn.textContent = addBtnOriginalText;
          if(data.status === "success") {

            // کدهای شما مو به مو حفظ شده است
            const taskItems = taskStatus.querySelectorAll(".task-status__item");
            let placed = false;

            for (let item of taskItems) {
              const textElement = item.querySelector(".task-status__text");

              if (textElement && textElement.textContent.trim() === "Personal Work No.") {
                textElement.textContent = taskValue;
                placed = true;
                break;
              }
            }

            if (!placed) {
              const newTaskItem = document.createElement("div");
              newTaskItem.className = "task-status__item";
              newTaskItem.innerHTML = `
                <div class="task-status__circale">
                  <div class="rounded-circle"></div>
                  <span class="task-status__text">${taskValue}</span>
                </div>
                <div class="task-status__delete">
                  <svg viewBox="0 0 20 24" xmlns="http://www.w3.org/2000/svg" class="task-status__delete-icon"> 
                    <path d="M1.99999 21.3333C1.99999 22.8 3.19999 24 4.66666 24H15.3333C16.8 24 18 22.8 18 21.3333V5.33333H1.99999V21.3333ZM4.66666 8H15.3333V21.3333H4.66666V8ZM14.6667 1.33333L13.3333 0H6.66666L5.33332 1.33333H0.666656V4H19.3333V1.33333H14.6667Z"/> 
                  </svg> 
                </div>
              `;
              taskStatus.appendChild(newTaskItem);
            }

            taskInput.value = ""; 
          }
        }).catch(err => {
          addBtn.textContent = addBtnOriginalText;
          alert("Network error.");
        });
      });


      taskStatus.addEventListener("click", (e) => {
        const circle = e.target.closest(".rounded-circle");
        if (!circle) return;

        const taskItem = circle.closest(".task-status__item");
        if (!taskItem) return;

        const textSpan = taskItem.querySelector(".task-status__text");
        if (!textSpan) return;

        if (textSpan.textContent.trim() === "Personal Work No.") {
          errorMsg.textContent = "No task to mark as done.";
          setTimeout(() => errorMsg.textContent = "", 2000);
          return;
        }

        // ارسال تغییرات به سرور قبل از اعمال کدهای شما
        const currentUser = localStorage.getItem("loggedInUser");
        if(currentUser) {
          fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action: "toggleTask", username: currentUser, task: textSpan.textContent.trim() })
          });
        }

        // کدهای اصلی شما
        const isDone = textSpan.classList.toggle("done-task");
        if (isDone) {
          circle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" class="checked-orange__check">
            <path d="M13.485 1.929l-7.07 7.07-3.536-3.536-1.414 1.414 4.95 4.95 8.485-8.485z" class="checked-orange__check"/>
          </svg>`;
          circle.classList.add("checked-orange");
        } else {
          circle.innerHTML = "";
          circle.classList.remove("checked-orange"); // رفع باگ کوچک برای برداشتن رنگ
        }
      });


      // delete task
      taskStatus.addEventListener("click", (e) => {
        if (e.target.closest(".task-status__delete")) {
          const taskItem = e.target.closest(".task-status__item");
          const textSpan = taskItem.querySelector(".task-status__text");
          const circle = taskItem.querySelector(".rounded-circle");
      
          if (textSpan.textContent.trim() === "Personal Work No.") {
            errorMsg.textContent = 'No task to delete.';
            setTimeout(() => errorMsg.textContent = "", 2000);
          } else {
            // آپدیت سرور برای حذف
            const currentUser = localStorage.getItem("loggedInUser");
            if(currentUser) {
              fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "deleteTask", username: currentUser, task: textSpan.textContent.trim() })
              });
            }

            // کدهای شما بدون هیچ تغییری حفظ شد
            if (taskItem.classList.contains('default-task')) {
              textSpan.classList.remove("done-task");
              if (circle) {
                circle.innerHTML = "";
                circle.classList.remove("checked-orange")
              }
              textSpan.textContent = "Personal Work No.";
            } else {
              taskItem.remove();
            }
          }
        }
      });


      filterLinks.forEach(link => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const filter = link.dataset.filter;
      
          const allTasks = taskStatus.querySelectorAll(".task-status__item");
      
          allTasks.forEach(task => {
            const textSpan = task.querySelector(".task-status__text");
            const isDone = textSpan.classList.contains("done-task");
      
            if (filter === "all") {
              task.style.display = "flex";
            } else if (filter === "waiting") {
              if (isDone) {
                task.style.display = "none";
              } else {
                task.style.display = "flex";
              }
            } else if (filter === "done") {
              if (isDone) {
                task.style.display = "flex";
              } else {
                task.style.display = "none";
              }
            }
          });
        });
      });
      filtermobile.forEach(link => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const filter = link.dataset.filter;
      
          const allTasks = taskStatus.querySelectorAll(".task-status__item");
      
          allTasks.forEach(task => {
            const textSpan = task.querySelector(".task-status__text");
            const isDone = textSpan.classList.contains("done-task");
      
            if (filter === "all") {
              task.style.display = "flex";
            } else if (filter === "waiting") {
              if (isDone) {
                task.style.display = "none";
              } else {
                task.style.display = "flex";
              }
            } else if (filter === "done") {
              if (isDone) {
                task.style.display = "flex";
              } else {
                task.style.display = "none";
              }
            }
          });
        });
      });
      
    });
    /* END OF ORIGINAL JS FOR SCRIPT.JS */
  </script>
</body>
</html>
