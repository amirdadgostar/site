<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لیست وظایف (Todo List)</title>
  <link rel="stylesheet" href="wendor/bootstrap/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="wendor/fontawsome/fontawesome.min.css">
  
  <style>
    /* START OF ORIGINAL app.css */
    body{
      background: #FFF;
      color: #222;
      font-family: Tahoma, Arial, sans-serif;
    }

    .header{ 
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 0;
      background-color: #F1ECE6;
      position: relative;
      font-size: 20px;
    }

    .header-login{ 
      position: absolute;
      left: 0; /* Changed from right to left for RTL */
      top: 47px;
      margin-left: 26px; /* Changed from margin-right */
    }

    .header-login__link--active:hover{
      background-color: #737373;
      color: #fff;
      transition: all 100ms ease;
      -webkit-transition: all 100ms ease;
      -moz-transition: all 100ms ease;
      -ms-transition: all 100ms ease;
      -o-transition: all 100ms ease;
    }

    .header-login__link:hover{
      background-color: #D98326;
      color: #fff;
      transition: all 100ms ease;
      -webkit-transition: all 100ms ease;
      -moz-transition: all 100ms ease;
      -ms-transition: all 100ms ease;
      -o-transition: all 100ms ease;
    }

    .btn-outline-primary:hover{ 
      background-color: #737373 !important;
    }
    .btn-outline-warning:hover{ 
      background-color: #D98326 !important;
    }

    .header__darkmode{ 
      all:unset;
      position: absolute;
      width: 20px;
      height: 20px;
      color: rgba(0, 0, 0, 0.5);
      left: 180px; /* Changed from right */
      bottom: 4px;
      font-size: 18px;
      cursor: pointer;
    }

    .bi-brightness-high-fill{ 
      font-size: 22px;
      bottom: 10px;
    }

    .header-filter{ 
      position: absolute;
      right: 0; /* Changed from left */
      top: 49px;
      margin-right: 26px; /* Changed from margin-left */
    }

    .wrapper{ 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      width: 90%;
      margin: 0 auto;
    }
    .add-task{ 
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 30px;
    }
    .error-msg{ 
      color: red;
      font-size: 14px;
      position: absolute;
      top: 190px;
    }
    .invalid{ 
      border: 1px solid red;
    }
    .add-task__input{
      display: block;
      width: 100%;
      background: #F1ECE6;
      border: none;
      outline: none;
      padding: 18px;
      border-radius: 0 20px 20px 0; /* Swapped for RTL */
      -webkit-border-radius: 0 20px 20px 0;
      -moz-border-radius: 0 20px 20px 0;
      -ms-border-radius: 0 20px 20px 0;
      -o-border-radius: 0 20px 20px 0;
    }
    .add-task__link{
      text-decoration: none;
      background-color: #76B7CD;
      padding: 18px 20px;
      color: #fff;
      font-weight: 500;
      border: none;
      border-radius: 20px 0 0 20px; /* Swapped for RTL */
      cursor: pointer;
      -webkit-border-radius: 20px 0 0 20px;
      -moz-border-radius: 20px 0 0 20px;
      -ms-border-radius: 20px 0 0 20px;
      -o-border-radius: 20px 0 0 20px;
    }

    .task-status{
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 25px;
      background-color: #F1ECE6;
      width: 100%;
      padding: 18px 20px 120px 20px;
      border-radius: 20px;
      -webkit-border-radius: 20px;
      -moz-border-radius: 20px;
      -ms-border-radius: 20px;
      -o-border-radius: 20px;
      position: relative;
      margin-bottom: 40px;
    }
    .task-status__item{ 
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      position: relative;
    }

    .task-status__circale{ 
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .done-task {
      text-decoration: line-through;
      color: gray;
    }

    .rounded-circle{
      width: 40px;
      height: 40px;
      border: 4px solid #737373;
      background-color: transparent;
      cursor: pointer;
      position: relative;
    }

    .checked-orange {
      border-color: #D98326 !important;
    }

    .checked-orange__check{ 
      position: absolute;
      top: 3px;
      width: 30px;
      height: 32px;
      fill:  #D98326 !important;
    }

    .task-status__text::after{ 
      content: "";
      position: absolute;
      width: 91%;
      height: 1px;
      background-color: #76B7CD;
      top: 55px;
      right: 51px; /* Changed to right for RTL */
      opacity: 0.4;
    }

    .task-status__delete{ 
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .task-status__delete-icon{ 
      fill: #000;
      opacity: 0.4;
    }

    .clear-complate{ 
      position: absolute;
      bottom: 18px;
      left: 58px; /* Changed to left for RTL */
    }
    .clear-complate__link{ 
      text-decoration: none;
      color: #D98326;
    }
    .clear-complate__icon{ 
      width: 22px;
      height: 27px;
    }

    .nav-btn{
      width: 40px;
      height: 40px;
      background-color: #F1ECE6;
      border-radius:12px;
      display: flex;
      justify-content: center;
      align-items:center;
      position: absolute;
      left: 10px; /* Changed to left for RTL */
      -webkit-border-radius:12px;
      -moz-border-radius:12px;
      -ms-border-radius:12px;
      -o-border-radius:12px;
    }
    .nav-btn__line{
      display: block;
      width: 28px;
      height: 3px;
      background-color: #737373;
      border-radius: 4px;
      -webkit-border-radius: 4px;
      -moz-border-radius: 4px;
      -ms-border-radius: 4px;
      -o-border-radius: 4px;
      transition: all 100ms ease-in-out;
      -webkit-transition: all 100ms ease-in-out;
      -moz-transition: all 100ms ease-in-out;
      -ms-transition: all 100ms ease-in-out;
      -o-transition: all 100ms ease-in-out;
    }

    .nav-btn__line::after{
      content: " ";
      display: block;
      position: absolute;
      width: 28px;
      height: 3px;
      background-color: #737373;
      bottom: 12px;
      border-radius: 4px;
      -webkit-border-radius: 4px;
      -moz-border-radius: 4px;
      -ms-border-radius: 4px;
      -o-border-radius: 4px;
      transition: all 200ms ease-in-out;
      -webkit-transition: all 200ms ease-in-out;
      -moz-transition: all 200ms ease-in-out;
      -ms-transition: all 200ms ease-in-out;
      -o-transition: all 200ms ease-in-out;
    }

    .nav-btn__line::before{
      content: " ";
      display: block;
      position: absolute;
      width: 28px;
      height: 3px;
      background-color: #737373;
      top: 13px;
      border-radius: 4px;
      -webkit-border-radius: 4px;
      -moz-border-radius: 4px;
      -ms-border-radius: 4px;
      -o-border-radius: 4px;
      transition: all 200ms ease-in-out;
      -webkit-transition: all 200ms ease-in-out;
      -moz-transition: all 200ms ease-in-out;
      -ms-transition: all 200ms ease-in-out;
      -o-transition: all 200ms ease-in-out;
    }

    .nav-btn__line--opern{ 
      background: transparent;
    }

    .nav-btn__line--opern::after{
      transform: translateY(-6px) rotate(-45deg);
      -webkit-transform: translateY(-6px) rotate(-45deg);
      -moz-transform: translateY(-6px) rotate(-45deg);
      -ms-transform: translateY(-6px) rotate(-45deg);
      -o-transform: translateY(-6px) rotate(-45deg);
    }
    .nav-btn__line--opern::before{
      transform: translateY(6px) rotate(45deg);
      -webkit-transform: translateY(6px) rotate(45deg);
      -moz-transform: translateY(6px) rotate(45deg);
      -ms-transform: translateY(6px) rotate(45deg);
      -o-transform: translateY(6px) rotate(45deg);
    }

    /* Start Darkmood Style */
    body.dark-mode {
      background-color: #202c3a;
      color: #fff;
    }

    body.dark-mode .header {
      background: rgba(28, 39, 51, 0.9); 
      backdrop-filter: blur(10px);   
      box-shadow: 0 1px 2px rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    body.dark-mode .header a,
    .dark-mode .header i { 
      color: #cfd6e6 !important
    }

    .dark-mode .btN{
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      color: #fff;
      border-radius: 8px;
      transition: all 3ms ease;
    }

    .dark-mode .add-task__input{ 
      background-color: rgba(28, 39, 51, 0.9);
      color: #cfd6e6 !important;
    }

    .dark-mode .add-task__link{ 
      background-color: #76b7cd17;
      color: #cfd6e6 !important;
    }

    .dark-mode .task-status{ 
      background-color: rgba(28, 39, 51, 0.9);
    }

    .dark-mode .task-status__text{ 
      color: #cfd6e6 !important;;
    }

    .dark-mode .task-status__delete-icon{ 
      fill: #cfd6e6;
      opacity: 0.6;
    }

    .dark-mode .nav-btn{ 
      background-color: #202c3a;
    }

    .dark-mode .mobile{ 
      background-color: rgba(32, 44, 58, 0.3);
      color: #cfd6e6;
    }

    .dark-mode .mobile-title{ 
      background-color: rgba(28, 39, 51, 0.9);
      color: #cfd6e6;
      box-shadow: 0 1px 2px rgba(255, 255, 255, 0.05);
      border: none;
    }

    .dark-mode .mobile-darkmode{ 
      color: #cfd6e6;
    }

    .dark-mode .error-msg{ 
      color: #cfd6e6;
    }
    /* Finish Darkmode Style */

    /* Start Responsive Header Style */
    .mobile{
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      z-index: 1;
      right: -300px; /* Swapped for RTL */
      top: 0;
      bottom: 0;
      background-color: rgba(191, 186, 180, 0.3);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 1rem;
      width: 75%;
      max-width: 300px;
      transition: all 200ms ease-in-out;
      -webkit-transition: all 200ms ease-in-out;
      -moz-transition: all 200ms ease-in-out;
      -ms-transition: all 200ms ease-in-out;
      -o-transition: all 200ms ease-in-out;
    }
    .mobile--open{ 
      right: 0; /* Swapped for RTL */
    }

    .mobile-title{ 
      position: absolute;
      top: 0;
      width: 100%;
      height: 50px;
      line-height: 50px;
      color: #737373;
      background-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      font-weight: bold;
      font-size: 27px;
      box-shadow: 0 0 10px rgba(255,255,255,02);
    }

    .mobile-login{ 
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: absolute;
      top: 260px;
      right: 31px; /* Swapped for RTL */
    }

    .btN{
      text-decoration: none;
      font-size: 18px;
      background-color: rgba(255, 255, 255, 0.1);
      color: #737373;
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(10px);
      padding: 5px 10px;
      border-radius: 7px;
      transition: all 0.3s ease;
      -webkit-border-radius: 7px;
      -moz-border-radius: 7px;
      -ms-border-radius: 7px;
      -o-border-radius: 7px;
    }
    .mobile-darkmode{ 
      position: absolute;
      top: 83px;
      left: 30px; /* Swapped for RTL */
      color: rgba(50, 50, 50, 0.7);
      cursor: pointer;
    }
    .mobile-filter{ 
      position: absolute;
      top: 80px;
      right: 31px; /* Swapped for RTL */
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      justify-content: center;
    }
    /* END OF ORIGINAL app.css */


    /* START OF ORIGINAL responsive.css */
    /* Mobile first */
    @media (max-width: 576px){ 
      .header-login{ 
        display: none;
      }
      .header-filter{ 
        display: none;
      }
      .header-logo{ 
        width: 154px;
        height: 40px;
      }
      /* Add task */
      .add-task__input,
      .add-task__link{ 
        font-size: 15px;
        padding: 15px 15px;
      }
      /* task status */
      .task-status__item{ 
        font-size: 15px;
      }
      .task-status__circale{ 
        gap: 12px;
      }
      .rounded-circle{ 
        width: 30px;
        height: 30px;
        border: 3px solid #737373;
      }
      .checked-orange__check{ 
        top: 4px;
        width: 22px;
        height: 22px;
      }
      .task-status__edit-container{ 
        top: 5px;
        left: 30px; /* RTL */
      }
      .task-status__delete-icon{ 
        width: 17px;
        height: 17px;
      }
      .task-status__text::after{ 
        width: 80%;
        top: 44px;
        right: 44px; /* RTL */
      }
      .clear-complate__icon {
        width: 18px;
        height: 21px;
      }
      .clear-complate__text{ 
        font-size: 15px;
      }
      .error-msg{ 
        top: 157px;
        font-size: 12px;
      }
    }

    /* Tablet */
    @media (min-width: 577px) and (max-width: 768px){ 
      .header-login{ 
        display: none;
      }
      .header-filter{ 
        display: none;
      }
      .header-logo{ 
        width: 200px;
        height: 62px;
      }
      .wrapper{ 
        width: 100%;
      }
      /* Add task */
      .add-task__input,
      .add-task__link{ 
        font-size: 17px;
        padding: 16px 20px;
      }
      /* Task status */
      .task-status__item{ 
        font-size: 17px;
      }
      .task-status__circale{ 
        gap: 12px;
      }
      .rounded-circle{ 
        width: 35px;
        height: 35px;
        border: 3px solid #737373;
      }
      .task-status__delete-icon{ 
        width: 20px;
        height: 20px;
      }
      .task-status__text::after{ 
        width: 88%;
        top: 48px;
        right: 44px; /* RTL */
      }
      .clear-complate__icon {
        width: 19px;
        height: 22px;
      }
      .clear-complate__text{ 
        font-size: 17px;
      }
      .error-msg{ 
        top: 185px;
        font-size: 13px;
      }
    }

    /* Lap top */
    @media (min-width: 769px) and (max-width: 992px){ 
      .nav-btn,
      .mobile{ 
        display: none;
      }
      .btN{ 
        font-size: 16px;
      }
      .header-logo{ 
        width: 216px;
        height: 62px;
      }
      .header__darkmood{ 
        left: 160px; /* RTL */
        width: 18px;
        height: 18px;
      }
      /* Task status */
      .task-status__delete-icon{ 
        width: 20px;
        height: 24px;
      }
      .task-status__text::after{ 
        width: 89%;
      }
    }

    /* Desktop */
    @media (min-width: 993px){ 
      .nav-btn,
      .mobile{ 
        display: none;
      }
      /* Task status */
      .task-status__delete-icon{ 
        width: 20px;
        height: 24px;
      }
      .task-status__text::after{ 
        width: 92%;
      }
    }
    /* END OF ORIGINAL responsive.css */
  </style>
</head>
