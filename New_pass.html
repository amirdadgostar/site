<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تغییر رمز عبور</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* START OF ORIGINAL New_pass.css */
    body{ 
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Tahoma, Arial, sans-serif;
      background-color: #fff;
    }

    .container{ 
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .row{
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-direction: column;
      margin: 70px 0;
      background-color: #F1ECE6;
      width: 400px;
      height: 467px;
      border-radius: 30px;
      -webkit-border-radius: 30px;
      -moz-border-radius: 30px;
      -ms-border-radius: 30px;
      -o-border-radius: 30px;
    }
    .header{ 
      margin: 60px 0;
    }

    .login-form{ 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }

    .password-group{
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 8px;
      position: relative;
    }

    .password-see{ 
      opacity: 0.3;
      position: absolute;
      left: 10px; /* RTL */
      top: 40px;
      cursor: pointer;
    }

    .password-see:hover{ 
      color: #737373;
      opacity: 1;
    }
    .error-msg {
      color: #dc3545;
      font-size: 12px;
      display: none;
      position: absolute;
      bottom: -25px;
      right: 0; /* RTL */
      font-family:sans-serif;
    }

    input.error {
      border: 1px solid #dc3545;
    }

    .get-password__text{
      color: #737373;
      font-weight: bold;
    }

    .get-password__input{ 
      width: 300px;
      padding: 13px 5px;
      border-radius: 10px;
      outline: none;
      border: 1px solid #8598d491;
      background-color: #F1ECE6;
    }

    .login-btn{
      display: block;
      text-decoration: none;
      border: 1px solid #8598d491;
      background-color: #737373;
      padding: 15px 44px;
      font-weight: bold;
      border-radius: 10px;
      color: #fff;
      width: 100%;
      text-align: center;
      margin-top: 4px;
      font-size: 18px;
      cursor: pointer;
    }

    @media (max-width: 500px){ 
      .row {
        width: 310px;
      }
      .get-password__input{ 
        width: 245px;
        padding: 9px 5px;
      }
      .header img { 
        width: 150px;
        height: 40px
      }
      .get-password__text{ 
        font-size: 14px;
      }
      .login-btn{ 
        font-size: 14px;
        padding: 12px 44px;
        margin-top: 20px;
      }
      .error-msg{ 
        bottom: -30px;
        right: 55px; /* RTL */
      }
    }
    /* END OF ORIGINAL New_pass.css */
  </style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="header">
        <img src="imges/To-Do-Logo 2.png" alt="Logo page" class="header-logo">
      </div>
  
      <form id="loginForm" novalidate class="login-form">
        <div class="password-group">
          <label for="password" class="get-password__text">رمز عبور جدید</label>
          <input type="password" id="password" class="get-password__input" required>
          <label for="confirmPassword" class="get-password__text">تکرار رمز عبور جدید</label>
          <input type="password" id="confirmPassword" class="get-password__input" required>
          <span class="password-see" id="passwordSee">
            <i class="fas fa-eye"></i>
          </span>
          <small class="error-msg" id="passwordError"></small>
        </div>

        <button type="submit" class="login-btn" id="submitBtn">ثبت رمز جدید</button>
      </form>
    </div> 
  </div>
  
  <script>
    /* START OF ORIGINAL New_pass.js + FETCH */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyUCEMdaukDMdWeC6RovqXNRtukCfprYT5Ut5Iw6bcD7jJkPldBoC0eUo9tTCdundMN-w/exec";

    const passwordSee = document.getElementById("passwordSee");
    let visible = false;
    passwordSee.addEventListener("click",()=> { 
      visible = !visible;
      const password = document.getElementById("password");
      const confirmPassword = document.getElementById("confirmPassword");
      
      password.type = visible ? "text" : "password";
      confirmPassword.type = visible ? "text" : "password";
      passwordSee.innerHTML = visible ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
    })

    document.addEventListener("DOMContentLoaded",()=> {
      const loginForm = document.getElementById("loginForm");
      const password = document.getElementById("password");
      const confirmpasswordInput = document.getElementById("confirmPassword");
      const passwordError = document.getElementById("passwordError");
      const submitBtn = document.getElementById("submitBtn");

      const recoverEmail = localStorage.getItem("recoverEmail");
      if(!recoverEmail) {
        alert("لطفاً ابتدا ایمیل خود را تایید کنید.");
        window.location.href = "./recover.html";
      }

      loginForm.addEventListener("submit", (e) => { 
        e.preventDefault();

        passwordError.textContent = "";
        password.classList.remove("invalid");
        confirmpasswordInput.classList.remove("invalid");

        const passwordValue = password.value.trim();
        const confirmpasswordValue = confirmpasswordInput.value.trim();

        let hasError = false;
        if (!passwordValue || !confirmpasswordValue) {
          passwordError.textContent = "رمز عبور را وارد کنید.";
          passwordError.style.display = "block";
          password.classList.add("invalid");
          hasError = true;

        } else if(passwordValue.length < 3 || passwordValue.length > 20){ 
          passwordError.textContent = "رمز عبور باید بین 6 تا 20 حرف باشد.";
          passwordError.style.display = "block";
          password.classList.add("invalid");
          hasError = true;
        }else if(passwordValue !== confirmpasswordValue){ 
          passwordError.textContent = "رمزها یکسان نیستند.";
          passwordError.style.display = "block";
          password.classList.add("invalid");
          hasError = true;
        }
      
        if (!hasError) {
          const originalBtnText = submitBtn.textContent;
          submitBtn.textContent = "در حال ذخیره...";

          fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ 
              action: "newpass", 
              email: recoverEmail, 
              newPassword: passwordValue 
            })
          })
          .then(res => res.json())
          .then(data => {
            if (data.status === 'success') {
              alert("رمز عبور با موفقیت تغییر کرد. حالا وارد شوید.");
              localStorage.removeItem("recoverEmail"); 
              window.location.href = "./sign_in.html";
            } else {
              alert("خطا در تغییر رمز عبور.");
              submitBtn.textContent = originalBtnText;
            }
          })
          .catch(err => {
            alert("خطا در ارتباط با سرور");
            submitBtn.textContent = originalBtnText;
          });
        }
      });
    })
  </script>
</body>
</html>
